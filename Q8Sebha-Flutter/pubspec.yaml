name: q8sebha
description: تطبيق Q8Sebha — مسابيح وأحجار كريمة
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # حالة التطبيق
  provider: ^6.1.2

  # شبكة وتخزين
  http: ^1.2.1
  shared_preferences: ^2.2.3
  web_socket_channel: ^2.4.5

  # صور
  cached_network_image: ^3.3.1

  # واجهة
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # رفع الصور
  image_picker: ^1.1.2

  # بيومتري (Face ID / بصمة الإصبع)
  local_auth: ^2.3.0

  # تخزين آمن (لحفظ بيانات Face ID)
  flutter_secure_storage: ^9.2.2

  # مشاركة
  share_plus: ^9.0.0

  # فتح روابط + واتساب
  url_launcher: ^6.3.0

  # تصغير/تكبير الصور
  photo_view: ^0.14.0

  # أيقونات
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
  # fonts: (أضف Tajawal لاحقاً بعد تحميل الملفات)
