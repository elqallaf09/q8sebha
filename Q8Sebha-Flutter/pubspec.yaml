name: q8sebha
description: تطبيق Q8Sebha — مسابيح وأحجار كريمة
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # حالة التطبيق
  provider: ^6.1.2

  # شبكة وتخزين
  http: ^1.2.1
  shared_preferences: ^2.2.3
  web_socket_channel: ^2.4.5

  # صور
  cached_network_image: ^3.3.1

  # واجهة
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # رفع الصور
  image_picker: ^1.1.2

  # أيقونات
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  # fonts: (أضف Tajawal لاحقاً بعد تحميل الملفات)
